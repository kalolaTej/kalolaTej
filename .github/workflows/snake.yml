name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *" # runs every 6 hours — change the cron if you want it more/less often
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate the snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#3ddc84&color_dots=#0b0e14,#132018,#1f3d2c,#2e7d4f,#3ddc84&color_background=#0b0e14
            dist/github-snake.gif?color_snake=#3ddc84&color_dots=#0b0e14,#132018,#1f3d2c,#2e7d4f,#3ddc84&color_background=#0b0e14

      - name: Push output to the "output" branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
